<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المطورين / الأدمن</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #1e824c;
        }

        .file-upload-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px dashed #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        input[type="file"] {
            font-size: 13px;
            color: #64748b;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #1e824c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: #196f3d;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>

<div class="card">
    <h2>لوحة تحكم المطورين / الأدمن</h2>
    
    <div class="form-group">
        <label for="pdfTitle">عنوان القانون أو الكتاب:</label>
        <input type="text" id="pdfTitle" placeholder="أدخل اسم الملف هنا...">
    </div>

    <div class="form-group">
        <label for="pdfFile">اختر ملف PDF:</label>
        <div class="file-upload-wrapper">
            <input type="file" id="pdfFile" accept="application/pdf">
        </div>
    </div>

    <button class="btn-submit" onclick="addPdfFile()">رفع الملف أونلاين</button>
</div>

<script>
    // كود الاتصال بالسيرفر السحابي
    const firebaseConfig = {
        apiKey: "AIzaSyAs7X3VzO0Y-3pM1nZ6WbQ8vR9_AlMeezan",
        authDomain: "almeezan-platform.firebaseapp.com",
        projectId: "almeezan-platform",
        storageBucket: "almeezan-platform.appspot.com",
        messagingSenderId: "58392019485",
        appId: "1:58392019485:web:a1b2c3d4e5f6"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 🛡️ كود الحماية: يمنع الدخول إلا بعد تسجيل الدخول من صفحة اللوجن
    if (sessionStorage.getItem('role') !== 'admin') {
        alert("تنبيه: غير مسموح لك بدخول هذه الصفحة إلا بعد تسجيل الدخول كـ (أدمن/مطور)!");
        window.location.href = 'login.html';
    }

    // دالة إضافة الملف وحفظ بياناته فوراً
    async function addPdfFile() {
        let titleInput = document.getElementById('pdfTitle');
        let fileInput = document.getElementById('pdfFile');
        
        if (!titleInput || titleInput.value.trim() === '') {
            alert('برجاء كتابة عنوان القانون أو الملف أولاً!');
            return;
        }
        if (!fileInput || fileInput.files.length === 0) {
            alert('برجاء اختيار ملف PDF أولاً!');
            return;
        }

        let title = titleInput.value.trim();
        let file = fileInput.files[0];

        try {
            await db.collection("lawBooks").add({
                title: title,
                fileName: file.name,
                author: "المكتبة الرقمية",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert('تم إضافة الكتاب/الملف بنجاح إلى قاعدة البيانات!');
            window.location.href = 'library.html';

        } catch (error) {
            console.error(error);
            alert('حدث خطأ: ' + error.message);
        }
    }
</script>

</body>
</html>
