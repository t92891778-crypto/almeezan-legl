<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | الميزان</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0d0d0d; color: #fff; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; position: relative; overflow-x: hidden; }
        
        /* 🔥 خلفية الميزان الفخمة 🔥 */
        body::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="%23d4af37" opacity="0.05"><path d="M432 192a64 64 0 1 0-64-64 64 64 0 0 0 64 64zM224 192a64 64 0 1 0-64-64 64 64 0 0 0 64 64zM256 0C114.61 0 0 114.61 0 256s114.61 256 256 256 256-114.61 256-256S397.39 0 256 0zm0 464c-114.69 0-208-93.31-208-208S141.31 48 256 48s208 93.31 208 208-93.31 208-208 208zm128-112H128a16 16 0 0 0 0 32h256a16 16 0 0 0 0-32zM368 224a16 16 0 0 0 0 32H144a16 16 0 0 0 0-32h224zm16 128a16 16 0 0 1-16 16H144a16 16 0 0 1-16-16 16 16 0 0 1 16-16h224a16 16 0 0 1 16 16z"/></svg>'); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: -1; }

        .profile-container { background-color: #141414; padding: 40px; border-radius: 12px; border: 1px solid #d4af37; width: 90%; max-width: 500px; box-sizing: border-box; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.1); margin-top: 50px; text-align: center; }
        .logo { color: #d4af37; font-size: 26px; font-weight: bold; margin-bottom: 30px; }
        
        /* 🖼️ صورة المستخدم الدائرية */
        .profile-pic-container { position: relative; display: inline-block; margin-bottom: 25px; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #d4af37; object-fit: cover; background-color: #262626; display: flex; justify-content: center; align-items: center; color: #aaa; font-size: 40px; font-weight: bold; }
        
        .user-name { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        .user-role { font-size: 14px; color: #aaa; margin-bottom: 30px; background-color: #262626; display: inline-block; padding: 5px 12px; border-radius: 15px; }

        .data-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #d4af37; font-size: 14px; }
        .data-field { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #262626; background-color: #1f1f1f; color: #fff; box-sizing: border-box; font-size: 15px; outline: none; }
        
        .btn-action { background-color: #d4af37; color: #0d0d0d; border: none; padding: 12px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; transition: background 0.3s; }
        .btn-action:hover { background-color: #fff; }
        .btn-back { background-color: transparent; color: #aaa; border: 1px solid #444; margin-top: 20px; text-decoration: none; display: inline-block; padding: 10px 20px; border-radius: 6px; transition: color 0.3s; }
        .btn-back:hover { color: #fff; border-color: #666; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="logo">الميزان | ملفك الشخصي</div>
        
        <div class="profile-pic-container">
            <div class="profile-pic" id="profilePic">A</div>
        </div>

        <div class="user-name" id="userName">هmahmoud Elshazly</div>
        <div class="user-role">مستخدم الميزان</div>

        <div class="data-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" id="userEmail" class="data-field" readonly>
        </div>

        <div class="data-group">
            <label>رقم العضوية:</label>
            <input type="text" id="membershipId" class="data-field" readonly>
        </div>

        <button class="btn-action" onclick="changePassword()">تغيير كلمة السر</button>
        <button class="btn-action" onclick="logout()">تسجيل الخروج</button>
<div id="passwordModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background-color: #141414; padding: 30px; border-radius: 12px; border: 1px solid #d4af37; width: 90%; max-width: 400px; text-align: right;">
        <h3 style="color: #d4af37; margin-top: 0; text-align: center;">تغيير كلمة السر</h3>
        
        <div class="data-group" style="margin-bottom: 15px;">
            <label>كلمة السر الحالية:</label>
            <input type="password" id="currentPass" class="data-field">
        </div>
        
        <div class="data-group" style="margin-bottom: 15px;">
            <label>كلمة السر الجديدة:</label>
            <input type="password" id="newPass" class="data-field">
        </div>

        <button class="btn-action" onclick="saveNewPassword()">حفظ كلمة السر الجديدة</button>
        <button class="btn-back" onclick="closePasswordModal()" style="width: 100%; box-sizing: border-box; text-align: center; margin-top: 10px;">إلغاء</button>
    </div>
</div>

        <a href="index.html" class="btn-back">← العودة للمكتبة الرئيسية</a>
    </div>

    <script>
      window.onload = function() {
    // بنشوف مين اللي مسجل دخول في المتصفح حالياً
    let role = sessionStorage.getItem('role');
    
    let profilePic = document.getElementById('profilePic');
    let userName = document.getElementById('userName');
    let userEmail = document.getElementById('userEmail');
    let membershipId = document.getElementById('membershipId');

    if (role === 'admin') {
        // البيانات اللي هتظهر لما تدخل كمطور (أدمن)
        profilePic.innerText = "M"; // أول حرف من Dev / Developer أو اسمك
        profilePic.style.backgroundColor = "#d4af37";
        profilePic.style.color = "#0d0d0d";
        userName.innerText = "المطور المحترف";
        userEmail.value = "admin@almeezan.com";
        membershipId.value = "MZ-DEV-2026";
    } else if (role === 'user') {
        // البيانات اللي هتظهر للزائر العادي
        profilePic.innerText = "U";
        profilePic.style.backgroundColor = "#262626";
        profilePic.style.color = "#fff";
        userName.innerText = "زائر المنصة الكريم";
        userEmail.value = "user@almeezan.com";
        membershipId.value = "MZ-USER-999";
    } else {
        // لو حد حاول يدخل الصفحة من غير تسجيل دخول أصلاً
        alert("برجاء تسجيل الدخول أولاً!");
        window.location.href = 'login.html';
    }
}
function changePassword() {
    // إظهار الشاشة عند الضغط على الزر
    document.getElementById('passwordModal').style.display = 'flex';
}

function closePasswordModal() {
    // إخفاء الشاشة وتفريغ الحقول
    document.getElementById('passwordModal').style.display = 'none';
    document.getElementById('currentPass').value = '';
    document.getElementById('newPass').value = '';
}

function saveNewPassword() {
    let currentPass = document.getElementById('currentPass').value;
    let newPass = document.getElementById('newPass').value;

    if (currentPass === '' || newPass === '') {
        alert('برجاء ملء جميع الخانات!');
        return;
    }

    alert('تم تغيير كلمة السر بنجاح وأمان!');
    closePasswordModal();
}

    </script>
</body>
</html>
